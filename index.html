<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Web Solutions - Professional Website Development</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --dark-bg: #0f172a;
            --dark-surface: #1e293b;
            --dark-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --success: #10b981;
            --warning: #f59e0b;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--dark-border);
            z-index: 1000;
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo span {
            color: var(--primary);
        }

        .nav-menu {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            background: var(--dark-surface);
            border-top: 1px solid var(--dark-border);
            list-style: none;
        }

        .nav-menu.active {
            display: flex;
        }

        .nav-menu li {
            border-bottom: 1px solid var(--dark-border);
        }

        .nav-menu a {
            display: block;
            padding: 16px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            padding-left: 30px;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        @media (min-width: 768px) {
            .nav-menu {
                display: flex !important;
                position: static;
                flex-direction: row;
                width: auto;
                background: none;
                border-top: none;
                gap: 40px;
            }

            .nav-menu li {
                border-bottom: none;
            }

            .nav-menu a {
                padding: 0;
                font-size: 14px;
            }

            .nav-menu a:hover {
                padding-left: 0;
                background: none;
            }

            .hamburger {
                display: none;
            }
        }

        /* Hero Section */
        .hero {
            margin-top: 70px;
            padding: 60px 20px;
            text-align: center;
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 900px;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero h1 .gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        @media (min-width: 768px) {
            .hero {
                padding: 100px 40px;
            }

            .hero h1 {
                font-size: 56px;
            }

            .hero p {
                font-size: 20px;
            }
        }

        /* Features Section */
        .features {
            padding: 80px 20px;
            background: var(--dark-surface);
            border-top: 1px solid var(--dark-border);
            border-bottom: 1px solid var(--dark-border);
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .section-header p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            padding: 40px 30px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .feature-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .feature-card:hover::before {
            left: 100%;
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 20px;
            width: 60px;
            height: 60px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover .feature-icon {
            background: rgba(99, 102, 241, 0.2);
            transform: scale(1.1);
        }

        .feature-card h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .feature-card p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        @media (min-width: 768px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-header h2 {
                font-size: 48px;
            }
        }

        @media (min-width: 1024px) {
            .features-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Services Section */
        .services {
            padding: 80px 20px;
        }

        .services-list {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }

        .service-item {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            padding: 30px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .service-item::left-border {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px 0 0 12px;
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .service-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateX(10px);
        }

        .service-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .service-number {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 50px;
        }

        .service-item h3 {
            font-size: 20px;
            color: var(--text-primary);
            margin: 0;
        }

        .service-item p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 15px;
        }

        /* Portfolio Section */
        .portfolio {
            padding: 80px 20px;
            background: var(--dark-surface);
            border-top: 1px solid var(--dark-border);
            border-bottom: 1px solid var(--dark-border);
        }

        .portfolio-grid {
            display: grid;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .portfolio-item {
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .portfolio-item:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.2);
        }

        .portfolio-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            overflow: hidden;
        }

        .portfolio-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        .portfolio-content {
            padding: 25px;
        }

        .portfolio-item h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .portfolio-desc {
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .portfolio-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .portfolio-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .portfolio-image {
                height: 300px;
            }
        }

        @media (min-width: 1024px) {
            .portfolio-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Pricing Section */
        .pricing {
            padding: 80px 20px;
        }

        .pricing-grid {
            display: grid;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pricing-card {
            background: var(--dark-surface);
            border: 2px solid var(--dark-border);
            border-radius: 12px;
            padding: 40px 30px;
            transition: all 0.3s ease;
            position: relative;
        }

        .pricing-card.featured {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.05));
            transform: scale(1.05);
        }

        .pricing-card:hover {
            border-color: var(--primary);
        }

        .pricing-badge {
            position: absolute;
            top: -15px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .pricing-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .pricing-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .pricing-amount {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pricing-period {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .pricing-features {
            list-style: none;
            margin-bottom: 30px;
        }

        .pricing-features li {
            padding: 12px 0;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .pricing-features li::before {
            content: '✓';
            color: var(--success);
            font-weight: 900;
            font-size: 18px;
            min-width: 20px;
        }

        .pricing-features li:last-child {
            border-bottom: none;
        }

        @media (min-width: 768px) {
            .pricing-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .pricing-card.featured {
                grid-column: 1 / -1;
                max-width: 500px;
                margin: 0 auto;
            }
        }

        @media (min-width: 1024px) {
            .pricing-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .pricing-card.featured {
                grid-column: 2;
                max-width: 100%;
            }
        }

        /* Process Section */
        .process {
            padding: 80px 20px;
            background: var(--dark-surface);
            border-top: 1px solid var(--dark-border);
            border-bottom: 1px solid var(--dark-border);
        }

        .process-timeline {
            max-width: 900px;
            margin: 0 auto;
        }

        .process-step {
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 30px;
            margin-bottom: 50px;
            position: relative;
        }

        .process-step:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 29px;
            top: 60px;
            width: 2px;
            height: calc(100% + 20px);
            background: linear-gradient(180deg, var(--primary), transparent);
        }

        .process-number {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .process-content h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .process-content p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* Testimonials Section */
        .testimonials {
            padding: 80px 20px;
        }

        .testimonials-grid {
            display: grid;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            padding: 35px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.15);
        }

        .testimonial-stars {
            color: var(--warning);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .testimonial-text {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
        }

        .author-info h4 {
            margin: 0;
            color: var(--text-primary);
            font-size: 16px;
        }

        .author-info p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

        @media (min-width: 768px) {
            .testimonials-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .testimonials-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* CTA Section */
        .cta-section {
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            text-align: center;
            margin: 80px 0;
            border-radius: 12px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-section h2 {
            font-size: 36px;
            margin-bottom: 15px;
            color: white;
        }

        .cta-section p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* FAQ Section */
        .faq {
            padding: 80px 20px;
            background: var(--dark-surface);
            border-top: 1px solid var(--dark-border);
            border-bottom: 1px solid var(--dark-border);
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .faq-item {
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            background: var(--dark-bg);
        }

        .faq-question {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            user-select: none;
        }

        .faq-question:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: var(--primary);
        }

        .faq-question h3 {
            margin: 0;
            color: var(--text-primary);
            font-size: 16px;
        }

        .faq-toggle {
            color: var(--primary);
            font-size: 20px;
            transition: transform 0.3s ease;
            min-width: 20px;
            text-align: center;
        }

        .faq-toggle.active {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: rgba(99, 102, 241, 0.03);
            padding: 0 20px;
        }

        .faq-answer.active {
            max-height: 300px;
            padding: 20px;
        }

        .faq-answer p {
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.8;
        }

        /* Footer */
        footer {
            background: var(--dark-bg);
            border-top: 1px solid var(--dark-border);
            padding: 50px 20px 30px;
            color: var(--text-secondary);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: grid;
            gap: 40px;
        }

        .footer-section h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 700;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 12px;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .footer-section a:hover {
            color: var(--primary);
            padding-left: 5px;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid var(--dark-border);
            padding-top: 30px;
            font-size: 14px;
        }

        .footer-social {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--dark-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        @media (min-width: 768px) {
            .footer-content {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .footer-content {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }
